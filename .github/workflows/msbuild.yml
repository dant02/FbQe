name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup pinned .NET 8 SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.419'

    - name: Add MSBuild to PATH
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        if (-not (Test-Path $vswhere)) {
          throw "vswhere.exe was not found at $vswhere"
        }

        $msbuildPath = & $vswhere `
          -latest `
          -version "[17.0,18.0)" `
          -requires Microsoft.Component.MSBuild `
          -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1

        if (-not $msbuildPath) {
          throw "MSBuild.exe was not found by vswhere"
        }

        $msbuildDir = Split-Path $msbuildPath -Parent
        "Using MSBuild from: $msbuildPath"
        $msbuildDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Show .NET environment
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        dotnet --info
        dotnet --list-sdks
        dotnet --list-runtimes

    - name: Restore .NET test project
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: dotnet restore FbQe.Tests/FbQe.Tests.csproj

    - working-directory: ${{env.GITHUB_WORKSPACE}}
      run: ./checkout.bat

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: x64_release
        path: |
          x64/Release/*.dll
          x64/Release/FbQe.runtimeconfig.json
        compression-level: 9
